name: Continuous Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: 'read'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          project_id: 'radiant-cycle-467714-t5'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/radiant-cycle-467714-t5/notely-ar-repo/notely:${{ github.sha }} .
      
      - name: Deploy to Cloud Run
        run: gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_NAME }} --region us-central1 --image us-central1-docker.pkg.dev/radiant-cycle-467714-t5/notely-ar-repo/notely:${{ github.sha }} --allow-unauthenticated --quiet