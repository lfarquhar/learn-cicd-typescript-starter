name: Continuous Deployment

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build       
        
      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
        with:
          project_id: 'radiant-cycle-467714-t5'
      
      - name: Use gcloud CLI
        run: gcloud info

      - name: Build Docker image
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/radiant-cycle-467714-t5/notely-ar-repo/notely:latest .
      
      #- name: Deploy to Cloud Run
      #  run: gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE_NAME }} --region us-central1 --image us-central1-docker.pkg.dev/radiant-cycle-467714-t5/notely-ar-repo/notely:${{ github.sha }} --allow-unauthenticated --quiet

